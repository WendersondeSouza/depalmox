<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/fonts.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back" />
    <title>Sistema simples</title>
    <style>
        table {
            border-collapse: collapse;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        th,
        td {
            padding: 8px;

        }
    </style>
</head>

<body class="oswald-font">
    <header class="cabecalho dir-row">
        <a class="centralizar" href="{{ url_for('index') }}">
            <span class="material-symbols-outlined text-decor-none">
                arrow_back
            </span>
        </a>
        <h1 class="titulo-1 w100">DEPALMOX
            <hr>
        </h1>
    </header>

    <main class="dir-row p0 main-back-height">
        <section class="h100 w50 centralizar p10px gray-back border-radius-15px dir-column">

            <form method="post"
                class="form-model ice-white-background w80 p10px bordas-suaves sombra-suave-fundo-escuro">
                    <h2 class="w100 p10px dflex x-center">
                        <p>CADASTRAR PRODUTO</p>
                    </h2>
                    <label class="p5px">Nome do Produto</label><br>
                    <input type="text" name="nome" class="form-box-style"><br><br>

                    <label class="p5px">Referência</label><br>
                    <input type="text" name="ref" class="form-box-style "><br><br>

                    <label class="p5px">Quantidade Inicial</label><br>
                    <input type="text" name="qntd" class="form-box-style "><br><br>

                    <button type="submit" class="bordas-suaves oswald-font-bold w50 centralizar">
                        <p class="p5px w100 h100 text-white btn-color bordas-suaves">CADASTRAR PRODUTO</p>
                    </button>
            </form>
        </section>
        <section class="estoque-section w50 h100 centralizar y-center dflex dir-column cor2">
            <div class="form-model branco_suave p3rem bordas-suaves sombra-suave-fundo-escuro centralizar dir-column">
                <h2>ESTOQUE</h2>

                <table>

                    <caption>teste</caption>
                    <tr>
                        <th>ITEM</th>
                        <th>REFERENCIA</th>
                        <th>QNTD</th>
                    </tr>
                    {% for produto in produtos %}
                    <tr>
                        <th>
                            {{ produto[0] }}
                            <form action="{{ url_for('delete', ref=produto[1]) }}" method="POST">
                                <button type="submit">Excluir</button>
                            </form>
                        </th>

                        <th>{{ produto[1] }}</th>

                        <th>{{ produto[2] }}</th>
                    </tr>
                    {% endfor %}
                </table>


            </div>
        </section>
    </main>






</body>

</html>
